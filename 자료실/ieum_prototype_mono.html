<!-- 이음(理音) — 단색 톤 리디자인 버전 -->
<!-- 하나의 잉크그린 색을 명도 단계로만 변주, 모든 아이콘은 단색 라인 SVG -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이음 · mono</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js"></script>
<style>
  :root{
    /* 단일 잉크그린 색을 명도로만 변주 */
    --ink:#27332D;        /* 가장 진한 톤 (primary) */
    --ink-2:#566159;      /* 중간 톤 */
    --ink-3:#8A938C;      /* 옅은 톤 (muted) */
    --tint:#EAEDE9;       /* 아주 옅은 면 */
    --tint-2:#DCE1DC;     /* 옅은 면 2 */
    --line:#E0E2DC;       /* 헤어라인 */
    --paper:#F5F3EC;      /* 배경 종이 */
    --surface:#FBFAF4;    /* 카드 표면 */
    --r:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:'Pretendard',system-ui,sans-serif;color:var(--ink);
    background:var(--paper);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:30px 16px 50px;gap:18px;letter-spacing:-.01em;
  }
  .ic-svg{width:1em;height:1em;display:inline-block;vertical-align:-.13em}

  .intro{max-width:380px;text-align:center}
  .intro .mark{font-size:13px;font-weight:800;letter-spacing:.32em;color:var(--ink)}
  .intro .mark b{font-weight:400;color:var(--ink-3)}
  .intro p{font-size:12px;color:var(--ink-3);margin-top:7px;line-height:1.65;letter-spacing:0}

  /* 역할 세그먼트 — 단색 */
  .roleseg{display:flex;gap:2px;background:var(--surface);padding:4px;border-radius:999px;
    border:1px solid var(--line)}
  .roleseg button{border:0;background:transparent;font-family:inherit;font-weight:600;
    font-size:12.5px;color:var(--ink-3);padding:9px 17px;border-radius:999px;cursor:pointer;
    transition:.22s;letter-spacing:-.01em}
  .roleseg button.on{background:var(--ink);color:var(--paper)}

  /* 폰 프레임 — 무채에 가깝게 */
  .phone{width:380px;max-width:94vw;height:762px;background:var(--paper);border-radius:40px;
    box-shadow:0 28px 64px -22px rgba(20,28,24,.4),0 0 0 10px #1a1d1b,0 0 0 12px #34383440;
    overflow:hidden;position:relative;display:flex;flex-direction:column}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:24px;
    background:#1a1d1b;border-radius:0 0 15px 15px;z-index:60}

  /* 헤더 */
  .hd{padding:34px 18px 13px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--line);position:relative;z-index:10}
  .hd .loc{display:flex;align-items:center;gap:4px;font-weight:700;font-size:16px}
  .hd .loc .ic-svg{font-size:14px;color:var(--ink-3)}
  .hd .loc small{font-size:11px;color:var(--ink-3);font-weight:500;margin-left:4px}
  .hd .bell{font-size:19px;color:var(--ink-2);cursor:pointer}
  .rolechip{font-size:10px;font-weight:700;padding:4px 10px;border-radius:999px;letter-spacing:.04em;
    border:1px solid var(--line);color:var(--ink-2);background:var(--surface)}

  .body{flex:1;overflow-y:auto;padding:15px 16px}
  .body::-webkit-scrollbar{width:0}

  .sectit{font-size:11px;font-weight:700;color:var(--ink-3);margin:16px 2px 9px;
    letter-spacing:.14em;text-transform:uppercase}
  .sectit:first-child{margin-top:2px}

  /* 카드 */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:13px;margin-bottom:9px;cursor:pointer;transition:.16s}
  .card:active{background:var(--tint)}
  .card.flat{cursor:default}
  .row{display:flex;gap:12px;align-items:center}
  .thumb{width:52px;height:52px;border-radius:13px;flex:none;display:grid;place-items:center;
    background:var(--tint);color:var(--ink);font-size:23px;border:1px solid var(--line)}
  .meta{flex:1;min-width:0}
  .meta h3{font-size:14px;font-weight:600;line-height:1.35;letter-spacing:-.01em}
  .meta .sub{font-size:11.5px;color:var(--ink-3);margin-top:3px}
  .meta .foot{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}

  /* 태그 — 색이 아니라 톤으로 구분 */
  .tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.02em}
  .tag.line{border:1px solid var(--tint-2);color:var(--ink-2);background:transparent}
  .tag.fill{background:var(--ink);color:var(--paper)}
  .tag.soft{background:var(--tint);color:var(--ink-2)}
  .verify{font-size:10.5px;color:var(--ink-2);font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .verify .ic-svg{font-size:12px}

  /* 신뢰 배너 — 단일 진한 톤 */
  .banner{background:var(--ink);color:var(--paper);border-radius:var(--r);padding:14px 15px;
    margin-bottom:12px;display:flex;gap:12px;align-items:flex-start}
  .banner .seal{width:36px;height:36px;border-radius:10px;border:1px solid rgba(245,243,236,.25);
    display:grid;place-items:center;font-size:18px;flex:none;color:var(--paper)}
  .banner b{font-size:13px;font-weight:700;letter-spacing:-.01em}
  .banner p{font-size:11px;color:rgba(245,243,236,.72);margin-top:3px;line-height:1.5}

  /* 통계 */
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:12px}
  .stat{background:var(--surface);padding:14px 6px;text-align:center}
  .stat b{display:block;font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
  .stat span{font-size:10px;color:var(--ink-3);font-weight:500;letter-spacing:.03em}

  /* 매칭 */
  .matchwrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:9px}
  .matchrow{display:flex;align-items:stretch;gap:8px}
  .mbox{flex:1;border:1px solid var(--line);border-radius:12px;padding:10px 11px;background:var(--paper)}
  .mbox b{font-size:12.5px;display:block;margin-bottom:3px;font-weight:600}
  .mbox small{color:var(--ink-3);font-size:10.5px}
  .marrow{display:grid;place-items:center;color:var(--ink-3);font-size:16px}
  .btn{width:100%;border:0;font-family:inherit;font-weight:700;font-size:13px;letter-spacing:-.01em;
    padding:12px;border-radius:12px;background:var(--ink);color:var(--paper);cursor:pointer;margin-top:11px}
  .btn:active{opacity:.85}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}

  /* 폼 */
  .field{margin-bottom:12px}
  .field label{font-size:10.5px;font-weight:700;color:var(--ink-3);display:block;margin-bottom:6px;
    letter-spacing:.1em;text-transform:uppercase}
  .field .inp{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 12px;
    font-size:13px;color:var(--ink)}
  .field .ph{color:var(--ink-3)}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chips span{font-size:11.5px;font-weight:600;padding:8px 13px;border-radius:999px;
    background:var(--surface);border:1px solid var(--line);color:var(--ink-3);letter-spacing:-.01em}
  .chips span.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  /* 증빙 */
  .cert{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:15px;margin-bottom:9px;position:relative}
  .cert .seal2{position:absolute;right:13px;top:13px;font-size:16px;color:var(--ink-3)}
  .cert b{font-size:13.5px;font-weight:700}
  .cert p{font-size:11.5px;color:var(--ink-3);margin-top:5px;line-height:1.55}

  /* 디테일 오버레이 */
  .overlay{position:absolute;inset:0;background:var(--paper);z-index:50;display:flex;flex-direction:column;
    animation:slideup .25s ease}
  @keyframes slideup{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
  .ovhd{padding:32px 16px 11px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line)}
  .ovhd .back{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:17px;
    background:var(--surface);border:1px solid var(--line);cursor:pointer;color:var(--ink-2)}
  .ovhd b{font-size:14px;font-weight:700;letter-spacing:.02em}
  .ovbody{flex:1;overflow-y:auto;padding:16px}
  .ovbody::-webkit-scrollbar{width:0}
  .hero{width:100%;height:140px;border-radius:var(--r);display:grid;place-items:center;font-size:48px;
    background:var(--tint);color:var(--ink);margin-bottom:15px;border:1px solid var(--line)}
  .deftit{font-size:18px;font-weight:700;line-height:1.35;letter-spacing:-.02em}
  .defmeta{font-size:12px;color:var(--ink-3);margin-top:6px;line-height:1.6}
  .divline{height:1px;background:var(--line);margin:15px 0}
  .infoline{display:flex;justify-content:space-between;font-size:12.5px;padding:8px 0}
  .infoline span:first-child{color:var(--ink-3);font-weight:500}
  .infoline span:last-child{font-weight:600}

  /* 하단 탭 */
  .tabs{display:flex;border-top:1px solid var(--line);padding:9px 6px 13px;background:var(--surface)}
  .tabs button{flex:1;border:0;background:transparent;font-family:inherit;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px;color:var(--ink-3)}
  .tabs button.on{color:var(--ink)}
  .tabs .ti{font-size:20px}
  .tabs .tl{font-size:9.5px;font-weight:600;letter-spacing:.02em}

  .legend{max-width:380px;font-size:11px;color:var(--ink-3);text-align:center;line-height:1.75;letter-spacing:0}
  .legend b{color:var(--ink-2);font-weight:700}
</style>

<div class="intro">
  <div class="mark">이음 <b>·</b> 理音</div>
  <p>지역사회보장협의체 나눔 매칭.<br>역할을 바꿔가며 화면 구조를 둘러보세요.</p>
</div>

<div x-data="ieum()">
  <div class="roleseg" style="margin:0 auto">
    <button :class="role==='donor'&&'on'" @click="setRole('donor')">후원자</button>
    <button :class="role==='member'&&'on'" @click="setRole('member')">협의체 위원</button>
    <button :class="role==='office'&&'on'" @click="setRole('office')">사무국</button>
  </div>

  <div class="phone" style="margin-top:16px">
    <div class="notch"></div>

    <!-- 헤더 -->
    <div class="hd">
      <div class="loc">선부동 <span class="ic-svg" x-html="ic('chevd')"></span><small x-text="roleLabel"></small></div>
      <div style="display:flex;align-items:center;gap:11px">
        <span class="rolechip" x-text="roleTag"></span>
        <span class="bell ic-svg" x-html="ic('bell')"></span>
      </div>
    </div>

    <div class="body" :key="role+screen">

      <!-- ── 후원자 ── -->
      <template x-if="role==='donor' && screen==='feed'">
        <div>
          <div class="banner">
            <div class="seal ic-svg" style="font-size:18px" x-html="ic('shield')"></div>
            <div><b>관공서가 보증하는 나눔</b><p>모든 매칭은 협의체 위원이 중개합니다. 받는 분은 노출되지 않습니다.</p></div>
          </div>
          <div class="sectit">우리 동네 나눔글</div>
          <template x-for="it in feed" :key="it.id">
            <div class="card" @click="open(it)">
              <div class="row">
                <div class="thumb ic-svg" x-html="ic(it.ic)"></div>
                <div class="meta">
                  <h3 x-text="it.title"></h3>
                  <div class="sub" x-text="it.shop + ' · ' + it.dist"></div>
                  <div class="foot">
                    <span class="tag line" x-text="it.kind"></span>
                    <span class="verify"><span class="ic-svg" x-html="ic('check')"></span>인증 나눔가게</span>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>

      <template x-if="role==='donor' && screen==='post'">
        <div>
          <div class="sectit">나눔 내놓기</div>
          <div class="field"><label>무엇을 나누시나요</label><div class="inp ph">예) 따뜻한 한끼 도시락 5개</div></div>
          <div class="field"><label>나눔 종류</label>
            <div class="chips"><span class="on">물품</span><span>서비스</span><span>식사</span><span>수리</span></div>
          </div>
          <div class="field"><label>수량 / 가능 횟수</label><div class="inp ph">예) 매주 화요일 5개</div></div>
          <div class="field"><label>가게 / 후원자명</label><div class="inp">엄마손칼국수</div></div>
          <div class="field"><label>전달 방식</label>
            <div class="chips"><span class="on">위원이 수령</span><span>대상자 방문</span><span>배달</span></div>
          </div>
          <button class="btn">나눔글 올리기</button>
          <p class="legend" style="margin-top:13px;max-width:none">올린 나눔글은 협의체 위원만 매칭에 사용하며,<br>받는 분의 정보는 후원자에게 공개되지 않습니다.</p>
        </div>
      </template>

      <template x-if="role==='donor' && screen==='mine'">
        <div>
          <div class="sectit">내 나눔 활동</div>
          <div class="stats">
            <div class="stat"><b>12</b><span>누적 나눔</span></div>
            <div class="stat"><b>38</b><span>나눔지수</span></div>
            <div class="stat"><b>3</b><span>이번 달</span></div>
          </div>
          <div class="sectit">공식 증빙</div>
          <div class="cert"><span class="seal2 ic-svg" x-html="ic('doc')"></span><b>2025년 기부금 영수증</b><p>관공서 발급 · 연말정산 세액공제 대상 · 환산액 384,000원</p></div>
          <div class="cert"><span class="seal2 ic-svg" x-html="ic('award')"></span><b>자원봉사 실적 인증서</b><p>1365 자원봉사 연계 · 누적 18시간</p></div>
          <div class="sectit">익명 감사 메시지</div>
          <div class="card flat"><div class="meta"><h3>“덕분에 아이들이 따뜻한 저녁을 먹었습니다”</h3><div class="sub">선부동 한 가정 · 위원 전달</div></div></div>
        </div>
      </template>

      <!-- ── 위원 ── -->
      <template x-if="role==='member' && screen==='cases'">
        <div>
          <div class="banner">
            <div class="seal ic-svg" x-html="ic('lock')"></div>
            <div><b>발굴 케이스 · 비식별</b><p>대상자 정보는 위원만 열람합니다. 후원자에게는 공개되지 않습니다.</p></div>
          </div>
          <div class="sectit">내가 발굴한 도움 필요</div>
          <template x-for="c in cases" :key="c.id">
            <div class="card" @click="open(c)">
              <div class="meta">
                <h3 x-text="c.code + ' · ' + c.need"></h3>
                <div class="sub" x-text="c.note"></div>
                <div class="foot">
                  <span class="tag" :class="c.urgent?'fill':'soft'" x-text="c.urgent?'긴급':'일반'"></span>
                  <span class="tag line" x-text="c.matched?'매칭완료':'매칭전'"></span>
                </div>
              </div>
            </div>
          </template>
          <button class="btn ghost"><span class="ic-svg" x-html="ic('plus')"></span> 새 케이스 등록</button>
        </div>
      </template>

      <template x-if="role==='member' && screen==='match'">
        <div>
          <div class="sectit">매칭하기</div>
          <p class="legend" style="text-align:left;max-width:none;margin:0 0 12px">왼쪽 ‘필요’와 오른쪽 ‘나눔’을 연결하면 도움이 닿습니다.</p>
          <div class="matchwrap">
            <div class="matchrow">
              <div class="mbox"><b>선부동 A가정</b><small>식료품 시급 · 4인</small></div>
              <div class="marrow ic-svg" x-html="ic('link')"></div>
              <div class="mbox"><b>강마트 쌀 10kg</b><small>물품 나눔 · 2포</small></div>
            </div>
            <button class="btn">이 매칭 확정</button>
          </div>
          <div class="matchwrap">
            <div class="matchrow">
              <div class="mbox"><b>초지동 B가정</b><small>집수리 필요</small></div>
              <div class="marrow ic-svg" x-html="ic('link')"></div>
              <div class="mbox"><b>한빛철물점</b><small>도어록·수도 수리</small></div>
            </div>
            <button class="btn">이 매칭 확정</button>
          </div>
          <div class="sectit">진행 중 매칭</div>
          <div class="card flat"><div class="meta"><h3>와동 C어르신 — 푸른세탁소</h3><div class="sub">이불 빨래 · 전달 예정 6/4</div><div class="foot"><span class="tag soft">진행중</span></div></div></div>
        </div>
      </template>

      <template x-if="role==='member' && screen==='report'">
        <div>
          <div class="sectit">활동 기록 · 보고서</div>
          <div class="stats">
            <div class="stat"><b>24</b><span>발굴 케이스</span></div>
            <div class="stat"><b>19</b><span>매칭 성사</span></div>
            <div class="stat"><b>5</b><span>공적 연계</span></div>
          </div>
          <div class="banner">
            <div class="seal ic-svg" x-html="ic('bot')"></div>
            <div><b>AI 월간 활동 보고서</b><p>매칭 기록을 모아 시청 제출용 보고서를 자동 생성합니다.</p></div>
          </div>
          <button class="btn">이번 달 보고서 생성</button>
          <div class="sectit">최근 보고서</div>
          <div class="card flat"><div class="row"><div class="thumb ic-svg" x-html="ic('doc')"></div><div class="meta"><h3>2025년 5월 활동 보고서</h3><div class="sub">매칭 19건 · PDF · 제출완료</div></div></div></div>
          <div class="card flat"><div class="row"><div class="thumb ic-svg" x-html="ic('doc')"></div><div class="meta"><h3>2025년 4월 활동 보고서</h3><div class="sub">매칭 15건 · PDF · 제출완료</div></div></div></div>
        </div>
      </template>

      <!-- ── 사무국 ── -->
      <template x-if="role==='office' && screen==='dash'">
        <div>
          <div class="sectit">협의체 현황</div>
          <div class="stats">
            <div class="stat"><b>147</b><span>인증가게</span></div>
            <div class="stat"><b>32</b><span>활동 위원</span></div>
            <div class="stat"><b>286</b><span>누적 매칭</span></div>
          </div>
          <div class="banner">
            <div class="seal ic-svg" x-html="ic('chart')"></div>
            <div><b>이번 달 임팩트</b><p>나눔 41건 · 도움 닿은 가정 38곳 · 환산액 1,920,000원</p></div>
          </div>
          <div class="sectit">긴급 모니터링</div>
          <div class="card flat"><div class="meta"><h3>매칭 대기 긴급 케이스 2건</h3><div class="sub">선부동 1 · 초지동 1 · 담당 위원 배정 필요</div><div class="foot"><span class="tag fill">긴급</span></div></div></div>
        </div>
      </template>
